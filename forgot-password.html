<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLOPrimeRP | Forgot password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-shell auth-page">
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="page-noise" aria-hidden="true"></div>

  <main class="auth-layout auth-layout-single">
    <section class="auth-card premium-panel">
      <div class="auth-card-head">
        <a class="brand compact-brand" href="index.html">
          <img class="brand-logo" src="assets/logo_2.png" alt="SLOPrimeRP logo">
          <span class="brand-wordmark">SLOPrimeRP</span>
        </a>
        <span class="section-tag">Recovery</span>
        <h2>Ponastavitev gesla</h2>
        <p>Poslji email zahtevo za reset povezavo. Trenutno je sistem pripravljen kot osnova za prihodnji produkcijski flow.</p>
      </div>

      <form class="auth-form" id="forgotPasswordForm">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="ime@email.com" required>
        </label>
        <button class="button button-gold auth-submit" type="submit">Poslji zahtevo</button>
      </form>

      <p class="form-message" id="authMessage"></p>

      <div class="auth-links-row">
        <a href="login.html">Nazaj na login</a>
        <a href="register.html">Ustvari account</a>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
